name: CalVer release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: calver-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run test:run

      - run: npm run build

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next CalVer tag
        id: calver
        run: bash scripts/calver-next-tag.sh

      - name: Create and push tag
        if: steps.calver.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.calver.outputs.tag }}"
          git push origin "refs/tags/${{ steps.calver.outputs.tag }}"

      - name: Publish GitHub Release
        if: steps.calver.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.calver.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
