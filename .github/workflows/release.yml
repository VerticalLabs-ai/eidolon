name: CalVer release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: calver-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: CalVer version for UI build
        run: |
          export GITHUB_OUTPUT="$(mktemp)"
          bash scripts/calver-next-tag.sh
          TAG="$(grep '^tag=' "$GITHUB_OUTPUT" | cut -d= -f2-)"
          echo "VITE_APP_VERSION=${TAG}" >> "$GITHUB_ENV"

      - run: pnpm run typecheck

      - run: pnpm run test:run

      - run: pnpm run build

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next CalVer tag
        id: calver
        run: bash scripts/calver-next-tag.sh

      - name: Create and push tag
        if: steps.calver.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.calver.outputs.tag }}"
          git push origin "refs/tags/${{ steps.calver.outputs.tag }}"

      - name: Publish GitHub Release
        if: steps.calver.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.calver.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
