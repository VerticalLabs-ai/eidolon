name: CalVer release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: calver-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.calver.outputs.tag }}
      skip: ${{ steps.calver.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile --filter '!@eidolon/desktop'

      - name: Compute next CalVer tag
        id: calver
        run: bash scripts/calver-next-tag.sh

      - name: CalVer version for UI build
        run: echo "VITE_APP_VERSION=${{ steps.calver.outputs.tag }}" >> "$GITHUB_ENV"

      - run: pnpm run typecheck

      - run: pnpm run test:run

      - run: pnpm run build

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create and push tag
        if: needs.verify.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.verify.outputs.tag }}"
          git push origin "refs/tags/${{ needs.verify.outputs.tag }}"

      - name: Publish GitHub Release
        if: needs.verify.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-mac:
    needs: verify
    if: needs.verify.outputs.skip != 'true'
    runs-on: macos-latest
    outputs:
      artifact-created: ${{ steps.signing-inputs.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Check macOS signing inputs
        id: signing-inputs
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [[ -n "$MACOS_CERTIFICATE_P12" && -n "$MACOS_CERTIFICATE_PASSWORD" && -n "$APPLE_SIGNING_IDENTITY" && -n "$APPLE_TEAM_ID" && -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping macOS DMG build because Developer ID signing secrets are not fully configured."
          fi

      - name: Import Developer ID certificate
        if: steps.signing-inputs.outputs.enabled == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - if: steps.signing-inputs.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build macOS DMG
        if: steps.signing-inputs.outputs.enabled == 'true'
        env:
          EIDOLON_DESKTOP_APP_URL: https://eidolon.verticallabs.ai
          EIDOLON_REQUIRE_MAC_SIGNING: "1"
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: pnpm desktop:make:mac

      - name: Upload DMG artifact
        if: steps.signing-inputs.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Eidolon-${{ needs.verify.outputs.tag }}-mac-arm64-dmg
          path: packages/desktop/out/make/*.dmg
          if-no-files-found: error

  attach-desktop:
    needs: [verify, release, desktop-mac]
    if: needs.verify.outputs.skip != 'true' && needs.desktop-mac.outputs.artifact-created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: Eidolon-${{ needs.verify.outputs.tag }}-mac-arm64-dmg
          path: desktop-artifacts

      - name: Attach DMG to GitHub Release
        run: gh release upload "${{ needs.verify.outputs.tag }}" desktop-artifacts/*.dmg --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
