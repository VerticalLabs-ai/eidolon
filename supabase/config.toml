# Supabase local development configuration for Eidolon.
#
# Only Postgres + Studio are enabled. Auth, Storage, Realtime, Edge Functions,
# and Analytics are turned off: Eidolon handles auth via Clerk and persists
# everything through its own Express server, so we just need a Postgres to
# point DATABASE_URL at. Drizzle owns the schema — this repo does NOT use
# supabase/migrations/.
#
# Connection string (used by .env.example):
#   postgresql://postgres:postgres@127.0.0.1:54322/postgres

project_id = "eidolon"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false

[realtime]
enabled = false
